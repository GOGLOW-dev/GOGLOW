<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoGLOW - Premium Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; color: #fff;
        }
        .container { 
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center; width: 100%; max-width: 420px; backdrop-filter: blur(10px); 
        }
        h2 { color: #f1c40f; margin-bottom: 8px; font-size: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .form-box { margin-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 30px; }
        input { 
            width: 100%; padding: 14px 20px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; color: #fff; outline: none;
        }
        .btn-regis { 
            width: 100%; background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%); 
            color: #111; border: none; padding: 16px; border-radius: 50px; font-weight: 700; cursor: pointer;
        }
        .btn-upload {
            display: none; width: 100%; background: #2ecc71; color: #fff; 
            padding: 16px; border-radius: 50px; font-weight: 700; text-decoration: none; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GoGLOW</h2>
    <div class="form-box" id="regisSection">
        <h3 style="margin-bottom:20px">Daftar & Upload</h3>
        <input type="text" id="nama" placeholder="Nama Lengkap">
        <input type="email" id="email" placeholder="Alamat Email">
        <button class="btn-regis" onclick="prosesDaftar()">AJUKAN & UPLOAD VIDEO</button>
    </div>
    
    <div id="uploadSection" style="display:none; margin-top: 30px;">
        <h3 style="color:#2ecc71">Pendaftaran Berhasil!</h3>
        <p style="margin: 15px 0; font-size: 14px; color: #aaa;">Klik tombol di bawah untuk mengunggah video Anda ke Google Drive kami.</p>
        <a id="driveLink" href="#" target="_blank" class="btn-upload" style="display:block">UNGGAH VIDEO KE DRIVE</a>
    </div>
</div>

<script>
    function prosesDaftar() {
        const nomorWA = "6285773292826"; // Ganti nomor Anda
        const linkDrive = "https://drive.google.com/drive/folders/11x5ERBbMh_CzpDqannpPzQwcOQ5t-KRK"; // Ganti link Drive Anda
        
        const nama = document.getElementById('nama').value;
        const email = document.getElementById('email').value;

        if(nama === "" || email === "") {
            alert("Isi data dulu ya!");
            return;
        }

        // 1. Kirim WA di tab baru
        const teks = `Halo Admin GoGLOW, saya ${nama} sudah daftar dan ingin upload video.`;
        window.open(`https://wa.me/${nomorWA}?text=${teks}`, '_blank');

        // 2. Munculkan tombol upload
        document.getElementById('regisSection').style.display = 'none';
        document.getElementById('uploadSection').style.display = 'block';
        document.getElementById('driveLink').href = linkDrive;
    }
</script>

</body>
</html>
