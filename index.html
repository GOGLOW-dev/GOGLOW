<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoGLOW - Premium Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & BASIC STYLE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; color: #fff;
        }

        /* --- CONTAINER UTAMA (KARTU) --- */
        .container { 
            background: rgba(255, 255, 255, 0.03); /* Transparan gelap */
            padding: 40px; border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1); /* Garis tepi tipis */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; 
            width: 100%; max-width: 420px;
            backdrop-filter: blur(10px); /* Efek kaca buram */
        }

        /* --- JUDUL & SUBJUDUL --- */
        h2 { 
            color: #f1c40f; /* Warna Emas Premium */
            margin-bottom: 8px; font-size: 32px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(241, 196, 15, 0.3);
        }
        p.subtitle { color: #aaa; margin-bottom: 35px; font-size: 15px; font-weight: 300; letter-spacing: 1px;}

        /* --- TOMBOL TOMBOL (LINKS) --- */
        .link-btn { 
            display: flex; align-items: center; justify-content: center;
            background: transparent; color: #fff; 
            text-decoration: none; padding: 16px; margin: 15px 0; 
            border-radius: 50px; font-weight: 600; font-size: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease; /* Transisi halus */
            position: relative; overflow: hidden;
        }

        /* Efek Hover Tombol (Saat disentuh) */
        .link-btn:hover { 
            background: #fff; color: #111;
            border-color: #fff; transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.2);
        }

        /* Tombol Spesial WhatsApp (Warna Hijau Lembut) */
        .wa { border-color: #2ecc71; color: #2ecc71; }
        .wa:hover { background: #2ecc71; color: #fff; border-color: #2ecc71; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3); }

        /* --- BAGIAN FORMULIR (DAFTAR) --- */
        .form-box { 
            margin-top: 40px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 30px; 
        }
        .form-box h3 { color: #fff; font-size: 20px; margin-bottom: 20px; font-weight: 600; letter-spacing: 1px;}

        /* Gaya Input Field (Kotak Isian) */
        input { 
            width: 100%; padding: 14px 20px; margin-bottom: 15px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50px; outline: none; color: #fff; font-size: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: #f1c40f; background: rgba(255, 255, 255, 0.1); } /* Fokus warna emas */

        /* Tombol Daftar Utama (Emas Mewah) */
        .btn-regis { 
            width: 100%; background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%); 
            color: #111; border: none; padding: 16px; border-radius: 50px; 
            font-weight: 700; cursor: pointer; font-size: 16px;
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3);
        }
        .btn-regis:hover { transform: scale(1.03); box-shadow: 0 8px 25px rgba(241, 196, 15, 0.5); }

        /* --- FOOTER KECIL --- */
        .footer-text { margin-top: 25px; color: #555; font-size: 12px; font-weight: 300; }
    </style>
</head>
<body>

<div class="container">
    <h2>GoGLOW</h2>
    <p class="subtitle">Premium Exclusive Portal</p>
    
    <a href="#" class="link-btn">Kunjungi GoGLOW Resmi</a>
    <a href="#" class="link-btn">Ikuti Instagram Kami</a>
    <a href="https://wa.me/6285714774628" class="link-btn wa">Chat Admin WhatsApp</a>
    
    <div class="form-box">
        <h3>Daftar Member Baru</h3>
        <input type="text" placeholder="Nama Lengkap Sesuai ID">
        <input type="email" placeholder="Alamat Email Aktif">
        <input type="password" placeholder="Buat Kata Sandi Kuat">
        <button class="btn-regis" onclick="alert('Selamat! Permohonan pendaftaran GoGLOW Anda sedang diproses.')">
            AJUKAN PENDAFTARAN
        </button>
    </div>

    <p class="footer-text">© 2024 GoGLOW Premium. All Rights Reserved.</p>
</div>

</body>
</html>
