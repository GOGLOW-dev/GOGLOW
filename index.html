<body>

<div class="app-container">
    <header>
        <h1>KIAGLOW</h1>
        <p style="font-style: italic; opacity: 0.9;">Your Personal Skincare Expert</p>
    </header>

    <main>
        <div class="card">
            <span class="section-title">Konsultasi AI</span>
            <div id="chat-container">
                <div class="msg ai-msg">Selamat datang di <b>KIAGLOW</b>. Ceritakan masalah kulit Anda, saya siap membantu.</div>
            </div>
            <div id="loading-text" class="loading"><i>KIAGLOW AI sedang meracik jawaban...</i></div>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Tulis keluhan Anda...">
                <button class="btn-send" onclick="askGemini()">➤</button>
            </div>
        </div>

        <section style="padding: 0 20px 20px 20px;">
            <span class="section-title" style="margin-left: 5px;">Rekomendasi KIAGLOW</span>
            <div class="product-grid">
                <div class="product-item">
                    <div style="font-size: 24px;">🧴</div>
                    <span>Face Serum</span>
                </div>
                <div class="product-item">
                    <div style="font-size: 24px;">🧼</div>
                    <span>Glow Wash</span>
                </div>
                <div class="product-item">
                    <div style="font-size: 24px;">☀️</div>
                    <span>Sun Protection</span>
                </div>
                <div class="product-item">
                    <div style="font-size: 24px;">🌙</div>
                    <span>Night Cream</span>
                </div>
            </div>
        </section>
    </main>

    <div class="footer-action">
        <a href="https://wa.me/6285773292826?text=Halo%20KIAGLOW,%20saya%20ingin%20pesan%20produk" class="btn-wa">HUBUNGI ADMIN (WA)</a>
    </div>
</div>

<script>
    // MASUKKAN API KEY GEMINI ANDA DI SINI
    const API_KEY = "MASUKKAN_API_KEY_ANDA_DI_SINI"; 

    async function askGemini() {
        const inputField = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');
        const loadingText = document.getElementById('loading-text');
        const userMsg = inputField.value;

        if (!userMsg) return;

        appendMessage(userMsg, 'user-msg');
        inputField.value = "";
        loadingText.style.display = "block";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `Kamu adalah asisten profesional dari brand skincare KIAGLOW. Jawab pertanyaan user dengan gaya bahasa yang elegan, sopan, dan ahli dalam kecantikan. Bantu mereka memberikan solusi skincare yang tepat: ${userMsg}` }]
                    }]
                })
            });

            const data = await response.json();
            const aiReply = data.candidates[0].content.parts[0].text;
            
            loadingText.style.display = "none";
            appendMessage(aiReply, 'ai-msg');
        } catch (error) {
            loadingText.style.display = "none";
            appendMessage("Maaf, layanan KIAGLOW AI sedang istirahat sebentar.", 'ai-msg');
        }
    }

    function appendMessage(text, className) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${className}`;
        msgDiv.innerHTML = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>
